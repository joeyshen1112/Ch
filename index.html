<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>旅遊方案分享</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23170f;
    --ink-soft:#5a4a3c;
    --hanji:#f4ecdd;
    --hanji-card:#fbf6ec;
    --pine:#16332c;
    --pine-2:#1f4339;
    --celadon:#3c6a5d;
    --brass:#bf962f;
    --brass-soft:#d8b964;
    --vermilion:#b23528;
    --maple:#c4642a;
    --line:#e2d4bd;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:"Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);
    background:var(--hanji);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  h1,h2,h3,.serif{font-family:"Noto Serif TC",serif}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    color:#f4ecdd;
    padding:78px 24px 110px;
    text-align:center;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(14,30,26,.78), rgba(14,30,26,.92)),
      url("https://res.klook.com/image/upload/c_fill,w_1600,h_900,q_75/activities/gcozb6rj1alo3g2yafzv.jpg") center/cover no-repeat,
      var(--pine);
  }
  .hero .eyebrow{
    letter-spacing:.5em;
    font-size:.72rem;
    color:var(--brass-soft);
    text-transform:uppercase;
    margin:0 0 18px;
    padding-left:.5em;
  }
  .hero h1{
    font-weight:900;
    font-size:clamp(2.1rem,6vw,3.6rem);
    margin:0;
    letter-spacing:.06em;
    line-height:1.2;
    text-shadow:0 2px 30px rgba(0,0,0,.4);
  }
  .hero .sub{
    font-family:"Noto Serif TC",serif;
    font-size:clamp(1rem,2.4vw,1.2rem);
    color:#e7dcc7;
    margin:18px auto 0;
    max-width:560px;
    font-weight:500;
  }
  .hero .rule{
    width:54px;height:2px;background:var(--brass);
    margin:26px auto 0;
  }
  .hero .stamp{
    position:absolute;top:30px;right:30px;
    width:78px;height:78px;border:2px solid var(--vermilion);
    color:var(--vermilion);
    display:grid;place-content:center;text-align:center;
    transform:rotate(-7deg);
    font-family:"Noto Serif TC",serif;font-weight:700;
    background:rgba(244,236,221,.06);
    border-radius:6px;line-height:1.15;
    font-size:.92rem;
  }
  @media(max-width:640px){.hero .stamp{width:60px;height:60px;font-size:.72rem;top:18px;right:18px}}

  .wrap{max-width:960px;margin:0 auto;padding:0 22px;width:100%}

  /* ---------- CARDS ---------- */
  .grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:24px;
    margin:-64px auto 40px;position:relative;z-index:2;
  }
  @media(max-width:720px){.grid{grid-template-columns:1fr}}

  .card{
    background:var(--hanji-card);
    border:1px solid var(--line);
    border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 18px 44px -30px rgba(35,23,15,.55);
    transition:transform .3s ease, box-shadow .3s ease;
    opacity:0;transform:translateY(22px);
    animation:rise .7s ease forwards;
  }
  .card:nth-child(2){animation-delay:.12s}
  .card:nth-child(3){animation-delay:.24s}
  .card:nth-child(4){animation-delay:.36s}
  @keyframes rise{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){
    .card{animation:none;opacity:1;transform:none}
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 28px 58px -28px rgba(35,23,15,.62)}

  .media{
    position:relative;aspect-ratio:16/9;
    background:linear-gradient(135deg,var(--pine),var(--celadon));
    display:grid;place-content:center;
  }
  .media img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .media .glyph{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(3.4rem,9vw,5rem);
    color:rgba(244,236,221,.92);
    text-shadow:0 4px 24px rgba(0,0,0,.35);
    position:relative;z-index:1;
  }
  .media .seal{
    position:absolute;top:14px;left:14px;z-index:2;
    width:46px;height:46px;background:var(--vermilion);color:#fbf6ec;
    display:grid;place-content:center;border-radius:7px;
    font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.5rem;
    transform:rotate(-5deg);
    box-shadow:0 4px 14px rgba(0,0,0,.3);
  }

  .body{padding:22px 24px 24px;display:flex;flex-direction:column;flex:1}
  .pos{font-size:.76rem;letter-spacing:.18em;color:var(--brass);font-weight:700;margin:0 0 6px}
  .body h3{margin:0 0 10px;font-size:1.34rem;color:var(--pine);line-height:1.35}
  .body p{margin:0 0 20px;font-size:.94rem;color:var(--ink-soft);flex:1}
  .cta{
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:8px;
    font-weight:700;font-size:.9rem;color:var(--pine);
    border-bottom:2px solid var(--brass);padding-bottom:2px;
    transition:gap .3s ease;
  }
  .card:hover .cta{gap:14px}

  /* ---------- FOOTER ---------- */
  footer{
    margin-top:auto;
    text-align:center;
    padding:28px 20px 34px;
    font-size:.82rem;color:var(--ink-soft);
  }
  footer .rule{width:40px;height:1px;background:var(--line);margin:0 auto 16px}
</style>
</head>
<body>

  <header class="hero">
    <div class="stamp">旅<br>遊<br>誌</div>
    <p class="eyebrow">Travel Notes</p>
    <h1>旅遊方案分享</h1>
    <p class="sub">整理過的行程比較與景點地圖，點選下方任一主題即可查看。</p>
    <div class="rule"></div>
  </header>

  <main class="wrap">
    <section class="grid">

      <!-- ▼▼ 一張卡片 = 一個頁面。要新增頁面時，複製下面這整段 <a class="card">…</a>，
           改 href（連到你的新 .html 檔）、glyph 印章字、pos、h3 標題、p 說明即可。 ▼▼ -->
      <a class="card" href="gyeongju.html">
        <div class="media">
          <span class="seal">慶</span>
          <span class="glyph">慶州</span>
        </div>
        <div class="body">
          <p class="pos">GYEONGJU · 慶州</p>
          <h3>慶州一日遊</h3>
          <p>釜山出發的慶州一日遊，七大方案完整比較（含自由行 vs. 包車 vs. 一日團）。</p>
          <span class="cta">查看比較 →</span>
        </div>
      </a>

      <a class="card" href="busan.html">
        <div class="media">
          <span class="seal">釜</span>
          <span class="glyph">釜山</span>
        </div>
        <div class="body">
          <p class="pos">BUSAN · 釜山</p>
          <h3>釜山互動景點地圖</h3>
          <p>分區玩法整理，搭配互動地圖與部落客文章、影片，規劃行程更直覺。</p>
          <span class="cta">打開地圖 →</span>
        </div>
      </a>
      <!-- ▲▲ 複製到這裡為止 ▲▲ -->

    </section>
  </main>

  <footer>
    <div class="rule"></div>
    旅遊方案分享
  </footer>

</body>
</html>
